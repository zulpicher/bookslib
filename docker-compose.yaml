version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432"
    networks:
      - bookslib-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"
    depends_on:
      auth-service:
        condition: service_started
      books-service:
        condition: service_started
      reviews-service:
        condition: service_started
    networks:
      - bookslib-net

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/auth_db?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookslib-net

  books-service:
    build: ./books-service
    ports:
      - "8082:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=books_db;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookslib-net

  reviews-service:
    build: ./reviews-service
    ports:
      - "8083:8000"
    environment:
      - DB_NAME=reviews_db
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bookslib-net

networks:
  bookslib-net:
    driver: bridge

volumes:
  postgres_data: